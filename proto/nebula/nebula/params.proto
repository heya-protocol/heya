syntax = "proto3";
package nebula.nebula;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "nebula/x/nebula/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "nebula/x/nebula/Params";
  option (gogoproto.equal) = true;

  
}